<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2A3240"/><stop offset="100%" stop-color="#3A4454"/></linearGradient>
  <linearGradient id="room" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3C4A5C"/><stop offset="100%" stop-color="#2C3848"/></linearGradient>
  <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2E3A48"/><stop offset="100%" stop-color="#222E3A"/></linearGradient>
  <radialGradient id="cityglw" cx=".5" cy=".6" r=".5"><stop offset="0%" stop-color="#4A6080" stop-opacity=".55"/><stop offset="100%" stop-color="#4A6080" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".72"><stop offset="46%" stop-color="transparent"/><stop offset="100%" stop-color="#080C14" stop-opacity=".72"/></radialGradient>
  <filter id="b5"><feGaussianBlur stdDeviation="5"/></filter>
  <filter id="b12"><feGaussianBlur stdDeviation="12"/></filter>
  <filter id="b18"><feGaussianBlur stdDeviation="18"/></filter>
</defs>
<!-- WIDE SHOT: back silhouette at rain window, rainy evening -->
<rect width="800" height="500" fill="url(#room)"/>
<!-- LARGE WINDOW (fills most of scene) -->
<rect x="60" y="20" width="680" height="400" rx="5" fill="url(#sky)" opacity=".9"/>
<!-- rainy city outside: blurred building masses -->
<rect x="80" y="60" width="100" height="300" fill="#1E2830" filter="url(#b18)" opacity=".7"/>
<rect x="190" y="40" width="80" height="320" fill="#1A2430" filter="url(#b18)" opacity=".65"/>
<rect x="278" y="70" width="60" height="290" fill="#1E2A34" filter="url(#b18)" opacity=".6"/>
<rect x="470" y="50" width="90" height="310" fill="#1E2830" filter="url(#b18)" opacity=".65"/>
<rect x="570" y="68" width="110" height="290" fill="#1A2430" filter="url(#b18)" opacity=".7"/>
<rect x="688" y="44" width="50" height="280" fill="#1E2A34" filter="url(#b18)" opacity=".58"/>
<!-- city lights bokeh (scattered glows) -->
<circle cx="120" cy="200" r="20" fill="#88AACC" filter="url(#b12)" opacity=".45"/>
<circle cx="196" cy="240" r="16" fill="#A0C8E0" filter="url(#b12)" opacity=".4"/>
<circle cx="258" cy="190" r="14" fill="#80A8C4" filter="url(#b12)" opacity=".38"/>
<circle cx="480" cy="220" r="18" fill="#90B0D0" filter="url(#b12)" opacity=".42"/>
<circle cx="596" cy="200" r="22" fill="#88AACC" filter="url(#b12)" opacity=".45"/>
<circle cx="670" cy="250" r="14" fill="#7898B8" filter="url(#b12)" opacity=".35"/>
<circle cx="140" cy="300" r="10" fill="#C0E0F0" filter="url(#b12)" opacity=".32"/>
<circle cx="390" cy="260" r="12" fill="#A0C0D8" filter="url(#b12)" opacity=".35"/>
<circle cx="700" cy="310" r="10" fill="#90B0CC" filter="url(#b12)" opacity=".3"/>
<!-- city glow -->
<rect x="60" y="20" width="680" height="400" fill="url(#cityglw)"/>
<!-- RAIN STREAKS on glass -->
<line x1="148" y1="20" x2="140" y2="420" stroke="#7090A8" stroke-width="1.2" opacity=".28"/>
<line x1="220" y1="20" x2="210" y2="420" stroke="#6888A0" stroke-width="1" opacity=".24"/>
<line x1="312" y1="20" x2="302" y2="420" stroke="#7090A8" stroke-width="1.2" opacity=".26"/>
<line x1="388" y1="20" x2="378" y2="420" stroke="#6888A0" stroke-width="1" opacity=".22"/>
<line x1="462" y1="20" x2="452" y2="420" stroke="#7090A8" stroke-width="1.1" opacity=".25"/>
<line x1="548" y1="20" x2="538" y2="420" stroke="#6888A0" stroke-width="1" opacity=".23"/>
<line x1="634" y1="20" x2="626" y2="420" stroke="#7090A8" stroke-width="1.1" opacity=".24"/>
<!-- rain droplets (small circles on glass) -->
<circle cx="180" cy="120" r="3.5" fill="#8AAAC4" opacity=".4"/>
<circle cx="350" cy="88" r="3" fill="#8AAAC4" opacity=".36"/>
<circle cx="520" cy="150" r="4" fill="#8AAAC4" opacity=".38"/>
<circle cx="260" cy="260" r="3" fill="#8AAAC4" opacity=".32"/>
<circle cx="620" cy="100" r="3.5" fill="#8AAAC4" opacity=".38"/>
<circle cx="430" cy="320" r="2.5" fill="#8AAAC4" opacity=".3"/>
<circle cx="104" cy="200" r="3" fill="#8AAAC4" opacity=".34"/>
<circle cx="700" cy="180" r="3" fill="#8AAAC4" opacity=".32"/>
<!-- window frame -->
<rect x="60" y="20" width="680" height="400" rx="5" fill="none" stroke="#38485A" stroke-width="10"/>
<rect x="396" y="20" width="10" height="400" fill="#38485A" opacity=".5"/>
<rect x="60" y="218" width="680" height="7" fill="#38485A" opacity=".4"/>
<!-- ROOM: walls flanking window -->
<rect x="0" y="0" width="64" height="500" fill="url(#room)" opacity=".9"/>
<rect x="736" y="0" width="64" height="500" fill="url(#room)" opacity=".9"/>
<!-- floor -->
<rect x="0" y="420" width="800" height="80" fill="url(#floor)"/>
<rect x="0" y="418" width="800" height="4" fill="#28384A" opacity=".4"/>
<!-- PERSON SILHOUETTE: standing, back to viewer, looking at rainy window -->
<!-- feet -->
<ellipse cx="346" cy="452" rx="44" ry="14" fill="#1C2830" opacity=".7"/>
<ellipse cx="436" cy="452" rx="38" ry="12" fill="#1C2830" opacity=".7"/>
<!-- body -->
<rect x="286" y="200" width="216" height="268" rx="36" fill="#1E2A38" opacity=".82"/>
<!-- head -->
<circle cx="392" cy="168" r="66" fill="#1A2432" opacity=".88"/>
<ellipse cx="392" cy="144" rx="66" ry="42" fill="#141C28" opacity=".9"/>
<!-- arm resting on window sill (right) -->
<path d="M484 330 Q560 360 736 380" fill="none" stroke="#1E2A38" stroke-width="32" stroke-linecap="round" opacity=".7"/>
<!-- faint reflection in glass (ghost) -->
<ellipse cx="392" cy="340" rx="80" ry="120" fill="#4A6080" filter="url(#b12)" opacity=".12"/>
<!-- vignette -->
<rect width="800" height="500" fill="url(#vig)"/>
<text x="32" y="468" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#7090A8" letter-spacing="4" opacity=".72">STORY 05  ·  I FEEL LIKE ~ING  ·  RAINY BLUE GRAY</text>
</svg>
