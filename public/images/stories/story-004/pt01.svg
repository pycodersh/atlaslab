  <radialGradient id="lamp" cx=".68" cy=".12" r=".55"><stop offset="0%" stop-color="#FFD080" stop-opacity=".92"/><stop offset="40%" stop-color="#F0A830" stop-opacity=".52"/><stop offset="100%" stop-color="#C07010" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".72"><stop offset="45%" stop-color="transparent"/><stop offset="100%" stop-color="#0A0600" stop-opacity=".7"/></radialGradient>
  <filter id="b3"><feGaussianBlur stdDeviation="3"/></filter>
  <filter id="b8"><feGaussianBlur stdDeviation="8"/></filter>
</defs>
<!-- DARK ROOM: TOP VIEW desk surface -->
<rect width="800" height="500" fill="#181006"/>
