<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="tbl" x1="0" y1="0" x2=".06" y2="1"><stop offset="0%" stop-color="#2C2010"/><stop offset="100%" stop-color="#1C1408"/></linearGradient>
  <linearGradient id="ppr" x1="0" y1="0" x2=".04" y2="1"><stop offset="0%" stop-color="#F4E8C8"/><stop offset="100%" stop-color="#E8D4A8"/></linearGradient>
  <radialGradient id="lamp" cx=".7" cy=".05" r=".56"><stop offset="0%" stop-color="#FFD080" stop-opacity=".92"/><stop offset="42%" stop-color="#F0A830" stop-opacity=".46"/><stop offset="100%" stop-color="#C07010" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".72"><stop offset="47%" stop-color="transparent"/><stop offset="100%" stop-color="#080400" stop-opacity=".7"/></radialGradient>
  <filter id="b4"><feGaussianBlur stdDeviation="4"/></filter>
  <filter id="b9"><feGaussianBlur stdDeviation="9"/></filter>
</defs>
<!-- TABLE SCENE — amber night -->
<rect width="800" height="500" fill="#181006"/>
<rect width="800" height="500" fill="url(#tbl)" opacity=".9"/>
<rect width="800" height="500" fill="url(#lamp)"/>
<!-- NOTES / PAPER (lower left, pushed aside) -->
<rect x="32" y="280" width="260" height="200" rx="6" fill="url(#ppr)" opacity=".88" transform="rotate(-5 162 380)"/>
<rect x="50" y="302" width="200" height="4" rx="2" fill="#8A6830" opacity=".48" transform="rotate(-5 150 304)"/>
<rect x="50" y="318" width="188" height="4" rx="2" fill="#8A6830" opacity=".42" transform="rotate(-5 144 320)"/>
<rect x="50" y="334" width="194" height="4" rx="2" fill="#8A6830" opacity=".38" transform="rotate(-5 147 336)"/>
<rect x="50" y="350" width="176" height="4" rx="2" fill="#8A6830" opacity=".35" transform="rotate(-5 138 352)"/>
<!-- underlines indicating done checking -->
<rect x="50" y="308" width="200" height="2.5" rx="1" fill="#C07020" opacity=".5" transform="rotate(-5 150 309)"/>
<rect x="50" y="324" width="188" height="2.5" rx="1" fill="#C07020" opacity=".44" transform="rotate(-5 144 325)"/>
<!-- PHONE CENTER: showing two morning alarms -->
<rect x="286" y="68" width="228" height="400" rx="32" fill="#1A1614" opacity=".96"/>
<rect x="298" y="80" width="204" height="376" rx="24" fill="#0C0A08" opacity=".96"/>
<!-- phone screen glow -->
<rect x="304" y="86" width="192" height="364" rx="20" fill="#1E2028" opacity=".92"/>
<!-- status bar -->
<rect x="314" y="96" width="60" height="8" rx="4" fill="#4A5060" opacity=".5"/>
<rect x="454" y="96" width="36" height="8" rx="4" fill="#4A5060" opacity=".45"/>
<!-- ALARM 1: 6:30 AM (active, amber) -->
<rect x="312" y="136" width="176" height="80" rx="14" fill="#2A2010" opacity=".9"/>
<text x="330" y="185" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="38" font-weight="bold" fill="#F0B030" opacity=".96">6:30</text>
<text x="332" y="202" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#C09040" letter-spacing="2" opacity=".78">AM  ·  WEEKDAY</text>
<!-- toggle switch ON -->
<rect x="440" y="144" width="40" height="22" rx="11" fill="#F0B030" opacity=".9"/>
<circle cx="469" cy="155" r="9" fill="#FFF0C0" opacity=".95"/>
<!-- ALARM 2: 6:45 AM -->
<rect x="312" y="232" width="176" height="80" rx="14" fill="#201A0A" opacity=".88"/>
<text x="330" y="280" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="38" font-weight="bold" fill="#D09030" opacity=".78">6:45</text>
<text x="332" y="296" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#A07830" letter-spacing="2" opacity=".6">AM  ·  BACKUP</text>
<!-- toggle ON -->
<rect x="440" y="240" width="40" height="22" rx="11" fill="#C08028" opacity=".8"/>
<circle cx="469" cy="251" r="9" fill="#F0D090" opacity=".88"/>
<!-- date label -->
<text x="338" y="108" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#6A6050" letter-spacing="3" opacity=".7">WED · DEC 18</text>
<!-- home indicator -->
<rect x="372" y="434" width="56" height="5" rx="2.5" fill="#4A4840" opacity=".6"/>
<!-- WATER GLASS (right of phone) -->
<rect x="558" y="188" width="84" height="204" rx="20" fill="#FFFFFF" opacity=".06"/>
<rect x="566" y="198" width="68" height="188" rx="16" fill="#1E2A34" opacity=".68"/>
<rect x="566" y="198" width="68" height="80" rx="16" fill="#FFFFFF" opacity=".06"/>
<ellipse cx="600" cy="214" rx="34" ry="10" fill="#FFFFFF" opacity=".1"/>
<!-- water surface glint -->
<rect x="570" y="278" width="60" height="3" rx="1.5" fill="#4A7090" opacity=".4"/>
<!-- LAMP CORD trailing bottom edge -->
<path d="M800 420 Q680 440 600 432 Q560 428 542 416" fill="none" stroke="#5A4020" stroke-width="7" stroke-linecap="round" opacity=".52"/>
<!-- lamp arm suggestion top right -->
<rect x="718" y="0" width="14" height="120" rx="7" fill="#6A5030" opacity=".48"/>
<!-- vignette -->
<rect width="800" height="500" fill="url(#vig)"/>
<text x="32" y="468" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#C09040" letter-spacing="4" opacity=".72">STORY 04  ·  I'M GOING TO ~  ·  AMBER NIGHT</text>
</svg>
