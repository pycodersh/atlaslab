<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EAE0CC"/><stop offset="100%" stop-color="#D8C8B0"/></linearGradient>
  <linearGradient id="desk" x1="0" y1="0" x2=".05" y2="1"><stop offset="0%" stop-color="#D4C4A4"/><stop offset="100%" stop-color="#BCA884"/></linearGradient>
  <radialGradient id="win" cx=".08" cy=".2" r=".6"><stop offset="0%" stop-color="#FFFFFF" stop-opacity=".55"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".72"><stop offset="52%" stop-color="transparent"/><stop offset="100%" stop-color="#7A6040" stop-opacity=".48"/></radialGradient>
  <filter id="b4"><feGaussianBlur stdDeviation="4"/></filter>
  <filter id="b10"><feGaussianBlur stdDeviation="10"/></filter>
</defs>
<!-- WALL -->
<rect width="800" height="500" fill="url(#wall)"/>
<!-- window (left wall, warm morning) -->
<rect x="-10" y="20" width="180" height="380" fill="#F4E8C8" filter="url(#b10)" opacity=".55"/>
<!-- window light on floor -->
<ellipse cx="90" cy="440" rx="140" ry="38" fill="#F4E8C0" opacity=".18" filter="url(#b4)"/>
<!-- desk surface -->
<rect x="0" y="330" width="800" height="170" fill="url(#desk)"/>
<rect x="0" y="328" width="800" height="5" fill="#E0D0B0" opacity=".4"/>
<!-- light -->
<rect width="800" height="500" fill="url(#win)"/>
<!-- STICKY NOTES on wall -->
<rect x="340" y="68" width="72" height="64" rx="3" fill="#F4D870" opacity=".78"/>
<rect x="340" y="76" width="52" height="4" rx="2" fill="#B09020" opacity=".45"/>
<rect x="340" y="86" width="44" height="3" rx="1.5" fill="#B09020" opacity=".4"/>
<rect x="340" y="96" width="48" height="3" rx="1.5" fill="#B09020" opacity=".35"/>
<rect x="424" y="54" width="68" height="60" rx="3" fill="#F8E890" opacity=".72"/>
<rect x="432" y="62" width="46" height="4" rx="2" fill="#A08018" opacity=".4"/>
<rect x="432" y="72" width="40" height="3" rx="1.5" fill="#A08018" opacity=".35"/>
<rect x="502" y="72" width="64" height="58" rx="3" fill="#F4CC70" opacity=".68"/>
<rect x="510" y="80" width="42" height="3" rx="1.5" fill="#A07818" opacity=".38"/>
<rect x="510" y="90" width="38" height="3" rx="1.5" fill="#A07818" opacity=".32"/>
<!-- DESK ITEMS -->
<rect x="400" y="344" width="140" height="10" rx="5" fill="#C8B890" opacity=".5"/>
<!-- coffee mug (side) -->
<rect x="608" y="324" width="64" height="78" rx="14" fill="#E8DCC8" opacity=".88"/>
<rect x="616" y="336" width="48" height="14" rx="7" fill="#C0A050" opacity=".4"/>
<path d="M672 340 Q690 354 672 368" fill="none" stroke="#DDD0B8" stroke-width="13" stroke-linecap="round"/>
<!-- PERSON: back view, sitting at desk -->
<!-- desk chair back (hint) -->
<rect x="188" y="208" width="8" height="160" rx="4" fill="#9A8868" opacity=".4"/>
<rect x="390" y="208" width="8" height="160" rx="4" fill="#9A8868" opacity=".4"/>
<!-- torso (from behind) -->
<ellipse cx="290" cy="380" rx="110" ry="54" fill="#A89070" opacity=".7"/>
<rect x="200" y="290" width="180" height="130" rx="24" fill="#B09878" opacity=".72"/>
<!-- shoulders -->
<ellipse cx="290" cy="298" rx="104" ry="36" fill="#A89070" opacity=".68"/>
<!-- head (back) -->
<circle cx="290" cy="234" r="54" fill="#B0987A" opacity=".75"/>
<!-- hair (pulled back, bun) -->
<ellipse cx="290" cy="214" rx="54" ry="34" fill="#2A1808" opacity=".82"/>
<circle cx="290" cy="196" r="22" fill="#3A2818" opacity=".78"/>
<!-- arm out to right (toward sticky notes) -->
<path d="M376 298 Q440 288 500 296" fill="none" stroke="#A89070" stroke-width="28" stroke-linecap="round" opacity=".68"/>
<!-- vignette -->
<rect width="800" height="500" fill="url(#vig)"/>
<text x="32" y="468" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#C8A870" letter-spacing="4" opacity=".75">STORY 01  ·  I SHOULD ~  ·  WARM BEIGE</text>
</svg>
