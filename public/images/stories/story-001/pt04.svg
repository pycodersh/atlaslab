<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="tbl" x1="0" y1="0" x2=".06" y2="1"><stop offset="0%" stop-color="#D8C8A8"/><stop offset="100%" stop-color="#C0A888"/></linearGradient>
  <linearGradient id="ppr" x1="0" y1="0" x2=".04" y2="1"><stop offset="0%" stop-color="#FAF6EE"/><stop offset="100%" stop-color="#EDE8DA"/></linearGradient>
  <radialGradient id="lgt" cx=".25" cy=".08" r=".68"><stop offset="0%" stop-color="#FFFFFF" stop-opacity=".58"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".7"><stop offset="52%" stop-color="transparent"/><stop offset="100%" stop-color="#7A6040" stop-opacity=".5"/></radialGradient>
  <filter id="b4"><feGaussianBlur stdDeviation="4"/></filter>
  <filter id="b8"><feGaussianBlur stdDeviation="8"/></filter>
</defs>
<!-- TABLE SURFACE fills frame (45° close-up) -->
<rect width="800" height="500" fill="url(#tbl)"/>
<rect width="800" height="500" fill="url(#lgt)"/>
<!-- window shadow on table -->
<rect x="0" y="0" width="180" height="500" fill="#F0E0C0" opacity=".12" transform="rotate(-4 90 250)"/>
<!-- NOTEBOOK open, centre -->
<rect x="140" y="40" width="440" height="420" rx="6" fill="url(#ppr)" opacity=".96"/>
<!-- spiral binding -->
<rect x="146" y="40" width="18" height="420" fill="#D8C8A8" opacity=".5"/>
<circle cx="155" cy="90" r="9" fill="#C0A878" opacity=".48"/>
<circle cx="155" cy="130" r="9" fill="#C0A878" opacity=".48"/>
<circle cx="155" cy="170" r="9" fill="#C0A878" opacity=".48"/>
<circle cx="155" cy="210" r="9" fill="#C0A878" opacity=".48"/>
<circle cx="155" cy="250" r="9" fill="#C0A878" opacity=".48"/>
<circle cx="155" cy="290" r="9" fill="#C0A878" opacity=".48"/>
<circle cx="155" cy="330" r="9" fill="#C0A878" opacity=".48"/>
<circle cx="155" cy="370" r="9" fill="#C0A878" opacity=".48"/>
<!-- Page title -->
<rect x="178" y="68" width="200" height="12" rx="4" fill="#B09040" opacity=".65"/>
<!-- body text lines -->
<rect x="178" y="100" width="370" height="5" rx="2" fill="#C8B870" opacity=".4"/>
<rect x="178" y="116" width="345" height="5" rx="2" fill="#C8B870" opacity=".35"/>
<rect x="178" y="132" width="360" height="5" rx="2" fill="#C8B870" opacity=".32"/>
<!-- KEY PASSAGE: underlined / highlighted -->
<rect x="178" y="158" width="370" height="5" rx="2" fill="#C8B870" opacity=".38"/>
<rect x="178" y="168" width="300" height="20" rx="3" fill="#E8D040" opacity=".35"/>
<rect x="178" y="172" width="295" height="5" rx="2" fill="#A07830" opacity=".55"/>
<!-- double underline -->
<rect x="178" y="179" width="295" height="3" rx="1.5" fill="#D09020" opacity=".5"/>
<rect x="178" y="184" width="295" height="2" rx="1" fill="#D09020" opacity=".35"/>
<!-- more lines -->
<rect x="178" y="200" width="355" height="5" rx="2" fill="#C8B870" opacity=".3"/>
<rect x="178" y="216" width="320" height="5" rx="2" fill="#C8B870" opacity=".28"/>
<!-- circled word -->
<ellipse cx="280" cy="248" rx="68" ry="18" fill="none" stroke="#C04010" stroke-width="2.5" opacity=".55"/>
<rect x="218" y="244" width="124" height="5" rx="2" fill="#C8B870" opacity=".3"/>
<rect x="178" y="268" width="340" height="5" rx="2" fill="#C8B870" opacity=".26"/>
<rect x="178" y="284" width="280" height="5" rx="2" fill="#C8B870" opacity=".24"/>
<!-- HIGHLIGHTER PEN entering from right -->
<rect x="510" y="148" width="16" height="200" rx="8" fill="#E8D040" opacity=".85" transform="rotate(10 518 248)"/>
<rect x="524" y="336" width="12" height="28" rx="6" fill="#C8A020" opacity=".8" transform="rotate(10 530 350)"/>
<!-- HAND from bottom-right (action: highlighting) -->
<ellipse cx="680" cy="420" rx="110" ry="65" fill="#C8A878" opacity=".82"/>
<rect x="590" y="350" width="28" height="90" rx="14" fill="#CCA874" transform="rotate(-15 604 395)"/>
<rect x="628" y="340" width="26" height="94" rx="13" fill="#C8A470" transform="rotate(-7 641 387)"/>
<rect x="664" y="344" width="24" height="90" rx="12" fill="#C4A06C" transform="rotate(3 676 389)"/>
<!-- mug (bokeh, top-left) -->
<ellipse cx="72" cy="88" rx="52" ry="54" fill="#D8C8A0" filter="url(#b8)" opacity=".7"/>
<path d="M62 68 Q56 48 62 28" fill="none" stroke="#C8B880" stroke-width="3" stroke-linecap="round" filter="url(#b4)" opacity=".45"/>
<path d="M80 64 Q86 44 80 24" fill="none" stroke="#C8B880" stroke-width="2.5" stroke-linecap="round" filter="url(#b4)" opacity=".38"/>
<!-- vignette -->
<rect width="800" height="500" fill="url(#vig)"/>
<text x="32" y="468" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#C8A870" letter-spacing="4" opacity=".75">STORY 01  ·  THAT'S BECAUSE ~  ·  WARM BEIGE</text>
</svg>
