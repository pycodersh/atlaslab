<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EDE5D4"/><stop offset="100%" stop-color="#D4C4A4"/></linearGradient>
  <linearGradient id="tbl" x1="0" y1="0" x2=".07" y2="1"><stop offset="0%" stop-color="#D8C8A8"/><stop offset="100%" stop-color="#BCA884"/></linearGradient>
