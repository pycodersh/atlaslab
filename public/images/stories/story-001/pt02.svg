<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EDE5D4"/><stop offset="100%" stop-color="#D0C0A0"/></linearGradient>
  <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0E8D8"/><stop offset="100%" stop-color="#E0D0B8"/></linearGradient>
  <linearGradient id="desk" x1="0" y1="0" x2=".05" y2="1"><stop offset="0%" stop-color="#D8C8A8"/><stop offset="100%" stop-color="#C0A888"/></linearGradient>
  <radialGradient id="win" cx=".18" cy=".15" r=".65"><stop offset="0%" stop-color="#FFFFFF" stop-opacity=".6"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".7"><stop offset="55%" stop-color="transparent"/><stop offset="100%" stop-color="#7A6040" stop-opacity=".45"/></radialGradient>
  <filter id="b5"><feGaussianBlur stdDeviation="5"/></filter>
  <filter id="b10"><feGaussianBlur stdDeviation="10"/></filter>
</defs>
<!-- WALL -->
<rect width="800" height="500" fill="url(#wall)"/>
<!-- window (bokeh, upper-left) -->
<rect x="-20" y="0" width="260" height="380" fill="#F4E8C0" filter="url(#b10)" opacity=".5"/>
<!-- desk surface -->
<rect x="0" y="320" width="800" height="180" fill="url(#desk)"/>
<rect x="0" y="318" width="800" height="5" fill="#E8D8B8" opacity=".4"/>
<!-- morning light -->
<rect width="800" height="500" fill="url(#win)"/>
<!-- BOOKS STACK (bokeh, right) -->
<g filter="url(#b5)" opacity=".6">
  <rect x="590" y="268" width="36" height="80" rx="3" fill="#D4A060"/>
  <rect x="630" y="280" width="32" height="68" rx="3" fill="#C8B880"/>
  <rect x="664" y="290" width="28" height="58" rx="3" fill="#D8B060"/>
  <rect x="694" y="302" width="24" height="46" rx="3" fill="#C4A878"/>
</g>
<!-- LAPTOP (bokeh, far, screen glow) -->
<rect x="460" y="220" width="220" height="140" rx="6" fill="#D0C0A0" filter="url(#b10)" opacity=".5"/>
<rect x="468" y="228" width="204" height="126" rx="4" fill="#E8E0D0" filter="url(#b5)" opacity=".45"/>
<!-- PERSON: back of head + chin-in-hand pose -->
<!-- body -->
<ellipse cx="300" cy="390" rx="100" ry="50" fill="#A89070" opacity=".72"/>
<!-- torso -->
<rect x="230" y="310" width="140" height="110" rx="28" fill="#B09878" opacity=".7"/>
<!-- head -->
<circle cx="300" cy="268" r="52" fill="#B8A07A" opacity=".75"/>
<!-- hair (bun) -->
<ellipse cx="300" cy="248" rx="52" ry="32" fill="#3A2818" opacity=".78"/>
<circle cx="300" cy="228" r="20" fill="#4A3820" opacity=".75"/>
<!-- ARM on desk (elbow, chin-in-hand) -->
<rect x="258" y="348" width="96" height="30" rx="15" fill="#C8A878" opacity=".7"/>
<!-- hand at chin -->
<ellipse cx="310" cy="315" rx="30" ry="26" fill="#C8A878" opacity=".72"/>
<!-- mug of coffee (side, on desk) -->
<rect x="80" y="334" width="64" height="78" rx="14" fill="#E8DCC8" opacity=".9"/>
<rect x="88" y="346" width="48" height="14" rx="7" fill="#C0A050" opacity=".45"/>
<path d="M144 350 Q164 364 144 378" fill="none" stroke="#DDD0B8" stroke-width="14" stroke-linecap="round"/>
<!-- steam -->
<path d="M100 334 Q96 314 100 294" fill="none" stroke="#D0C0A0" stroke-width="2.5" stroke-linecap="round" opacity=".45"/>
<path d="M118 330 Q122 310 118 290" fill="none" stroke="#D0C0A0" stroke-width="2" stroke-linecap="round" opacity=".38"/>
<!-- notebook open on desk (background) -->
<rect x="360" y="340" width="180" height="130" rx="4" fill="#FAF6EE" filter="url(#b5)" opacity=".7"/>
<!-- vignette -->
<rect width="800" height="500" fill="url(#vig)"/>
<text x="32" y="468" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#C8A870" letter-spacing="4" opacity=".75">STORY 01  ·  I'M THINKING ABOUT ~  ·  WARM BEIGE</text>
</svg>
