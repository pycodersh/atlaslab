<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0E8D8"/><stop offset="100%" stop-color="#D8C8A8"/></linearGradient>
  <linearGradient id="tbl" x1="0" y1="0" x2=".08" y2="1"><stop offset="0%" stop-color="#E0D0B8"/><stop offset="100%" stop-color="#C8B898"/></linearGradient>
  <linearGradient id="ppr" x1="0" y1="0" x2=".05" y2="1"><stop offset="0%" stop-color="#FAF6EE"/><stop offset="100%" stop-color="#EDE8DA"/></linearGradient>
  <radialGradient id="lgt" cx=".3" cy=".1" r=".7"><stop offset="0%" stop-color="#FFFFFF" stop-opacity=".55"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".72"><stop offset="55%" stop-color="transparent"/><stop offset="100%" stop-color="#8A7050" stop-opacity=".45"/></radialGradient>
  <filter id="b4"><feGaussianBlur stdDeviation="4"/></filter>
  <filter id="b9"><feGaussianBlur stdDeviation="9"/></filter>
</defs>
<!-- BG: warm beige, top-down view -->
<rect width="800" height="500" fill="url(#bg)"/>
<!-- table oval -->
<ellipse cx="400" cy="300" rx="380" ry="240" fill="url(#tbl)"/>
<!-- morning light -->
<rect width="800" height="500" fill="url(#lgt)"/>
<!-- window shadow stripes -->
<rect x="0" y="0" width="120" height="500" fill="#F0E0C0" opacity=".15" transform="rotate(-3 60 250)"/>
