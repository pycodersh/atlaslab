<circle cx="560" cy="350" r="18" fill="none" stroke="#A89070" stroke-width="3" opacity=".7"/>
<circle cx="560" cy="350" r="10" fill="#B89868" opacity=".4"/>
<rect x="575" y="348" width="45" height="6" rx="3" fill="#A89070" opacity=".7"/>
<rect x="605" y="340" width="6" height="7" rx="2" fill="#9A8060" opacity=".65"/>
<rect x="613" y="340" width="6" height="7" rx="2" fill="#9A8060" opacity=".65"/>
<!-- vignette -->
<rect width="800" height="500" fill="url(#vig)"/>
<!-- label -->
<text x="32" y="468" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#C8A870" letter-spacing="4" opacity=".75">STORY 01  ·  I WANT TO ~  ·  WARM BEIGE</text>
</svg>
