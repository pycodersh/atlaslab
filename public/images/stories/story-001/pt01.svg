<rect x="264" y="188" width="145" height="4" rx="2" fill="#C8B880" opacity=".45"/>
<rect x="248" y="212" width="8" height="8" rx="2" fill="#C8A060" opacity=".65"/>
<path d="M250 216 L254 221 L262 212" fill="none" stroke="#F0E8D8" stroke-width="1.5" stroke-linecap="round"/>
<rect x="264" y="214" width="118" height="4" rx="2" fill="#C8B880" opacity=".5"/>
<rect x="248" y="238" width="8" height="8" rx="2" fill="none" stroke="#C8A060" stroke-width="1.5"/>
<rect x="264" y="240" width="140" height="4" rx="2" fill="#C8B880" opacity=".4"/>
