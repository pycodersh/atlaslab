<rect x="444" y="90" width="14" height="180" rx="7" fill="#9A8060" opacity=".75" transform="rotate(14 451 180)"/>
<!-- pen tip -->
<polygon points="458,258 448,270 470,278" fill="#7A6040" opacity=".7"/>
<!-- COFFEE MUG top-view, left -->
<circle cx="112" cy="280" r="58" fill="#D8C8A8" opacity=".88"/>
<circle cx="112" cy="280" r="42" fill="#E8DCC0" opacity=".85"/>
<circle cx="112" cy="280" r="24" fill="#C0A050" opacity=".55"/>
