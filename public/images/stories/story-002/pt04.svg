<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="outside" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A0AAAA"/><stop offset="100%" stop-color="#7A8888"/></linearGradient>
  <linearGradient id="inside" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C8A060"/><stop offset="100%" stop-color="#A07840"/></linearGradient>
  <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8A6030"/><stop offset="100%" stop-color="#6A4018"/></linearGradient>
  <radialGradient id="glow" cx=".5" cy=".4" r=".55"><stop offset="0%" stop-color="#FFE090" stop-opacity=".5"/><stop offset="100%" stop-color="#FFE090" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".72"><stop offset="48%" stop-color="transparent"/><stop offset="100%" stop-color="#181008" stop-opacity=".65"/></radialGradient>
  <filter id="b6"><feGaussianBlur stdDeviation="6"/></filter>
  <filter id="b12"><feGaussianBlur stdDeviation="12"/></filter>
</defs>
<!-- OUTSIDE: cool blue-gray afternoon street -->
<rect width="800" height="500" fill="url(#outside)"/>
<!-- city buildings outside (bokeh) -->
<rect x="20" y="40" width="100" height="280" fill="#8A9898" filter="url(#b12)" opacity=".55"/>
<rect x="130" y="80" width="80" height="240" fill="#809090" filter="url(#b12)" opacity=".5"/>
<rect x="220" y="60" width="60" height="260" fill="#8A9A9A" filter="url(#b12)" opacity=".48"/>
<rect x="540" y="50" width="110" height="270" fill="#8A9898" filter="url(#b12)" opacity=".52"/>
<rect x="660" y="70" width="130" height="250" fill="#809090" filter="url(#b12)" opacity=".5"/>
<!-- CAFÉ WINDOW FRAME (large, fills most of frame) -->
<rect x="60" y="20" width="680" height="420" rx="6" fill="url(#inside)" opacity=".7"/>
<!-- warm glow from inside -->
<rect x="60" y="20" width="680" height="420" rx="6" fill="url(#glow)"/>
<!-- window glass panes -->
<rect x="66" y="26" width="328" height="202" rx="3" fill="#D4A858" opacity=".55"/>
<rect x="406" y="26" width="328" height="202" rx="3" fill="#CC9E50" opacity=".52"/>
<rect x="66" y="236" width="328" height="198" rx="3" fill="#C89848" opacity=".5"/>
<rect x="406" y="236" width="328" height="198" rx="3" fill="#C49040" opacity=".48"/>
<!-- window frame bars -->
<rect x="394" y="20" width="14" height="420" rx="7" fill="#C89040" opacity=".5"/>
<rect x="60" y="228" width="680" height="10" rx="5" fill="#C89040" opacity=".42"/>
<!-- INTERIOR: café floor/table hint -->
<rect x="66" y="370" width="668" height="70" fill="url(#floor)" opacity=".6"/>
<!-- TWO SILHOUETTES (side view, backlit by warm café light) -->
<!-- Person A (left) — slightly shorter -->
<rect x="228" y="158" width="88" height="242" rx="20" fill="#2A1808" opacity=".9"/>
<circle cx="270" cy="130" r="42" fill="#2A1808" opacity=".9"/>
<ellipse cx="270" cy="112" rx="42" ry="26" fill="#1A1008" opacity=".9"/>
<!-- Person B (right) — slightly taller, leaning toward A -->
<rect x="482" y="142" width="86" height="258" rx="20" fill="#2A1808" opacity=".88"/>
<circle cx="524" cy="112" rx="40" fill="#2A1808" opacity=".88"/>
<ellipse cx="524" cy="94" rx="40" ry="24" fill="#1A1008" opacity=".88"/>
<!-- subtle lean toward each other -->
<path d="M314 172 Q396 164 484 172" fill="#2A1808" opacity=".4"/>
<!-- street pavement below window -->
<rect x="0" y="440" width="800" height="60" fill="#5A5A58" opacity=".7"/>
<!-- reflections on wet pavement -->
<ellipse cx="270" cy="466" rx="60" ry="10" fill="#D4A050" filter="url(#b6)" opacity=".22"/>
<ellipse cx="524" cy="470" rx="50" ry="8" fill="#D4A050" filter="url(#b6)" opacity=".18"/>
<!-- vignette -->
<rect width="800" height="500" fill="url(#vig)"/>
<text x="32" y="468" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#D4A870" letter-spacing="4" opacity=".75">STORY 02  ·  IT SEEMS LIKE ~  ·  COFFEE BROWN</text>
</svg>
