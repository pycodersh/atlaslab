<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C8A870"/><stop offset="100%" stop-color="#A07848"/></linearGradient>
  <linearGradient id="tbl" x1="0" y1="0" x2=".05" y2="1"><stop offset="0%" stop-color="#7A5030"/><stop offset="100%" stop-color="#5A3818"/></linearGradient>
  <linearGradient id="mug" x1="0" y1="0" x2=".2" y2="1"><stop offset="0%" stop-color="#EEE8DC"/><stop offset="100%" stop-color="#D4C8B0"/></linearGradient>
  <linearGradient id="skA" x1="0" y1="0" x2=".2" y2="1"><stop offset="0%" stop-color="#C8A070"/><stop offset="100%" stop-color="#A07848"/></linearGradient>
  <linearGradient id="skB" x1="0" y1="0" x2=".2" y2="1"><stop offset="0%" stop-color="#C09068"/><stop offset="100%" stop-color="#987050"/></linearGradient>
  <radialGradient id="lamp" cx=".5" cy=".1" r=".52"><stop offset="0%" stop-color="#FFE090" stop-opacity=".68"/><stop offset="100%" stop-color="#FFE090" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".72"><stop offset="50%" stop-color="transparent"/><stop offset="100%" stop-color="#2A1408" stop-opacity=".6"/></radialGradient>
  <filter id="b4"><feGaussianBlur stdDeviation="4"/></filter>
</defs>
<!-- CAFÉ WALL -->
<rect width="800" height="500" fill="url(#wall)"/>
<rect width="800" height="500" fill="url(#lamp)"/>
<!-- table -->
<rect x="0" y="318" width="800" height="182" fill="url(#tbl)"/>
<rect x="0" y="316" width="800" height="5" fill="#A07840" opacity=".32"/>
<!-- bokeh mugs on table -->
<rect x="100" y="288" width="72" height="88" rx="16" fill="url(#mug)" filter="url(#b4)" opacity=".7"/>
<rect x="628" y="280" width="68" height="84" rx="14" fill="url(#mug)" filter="url(#b4)" opacity=".65"/>
<!-- PERSON A (left, leaning forward, head down, apologetic) -->
<rect x="60" y="148" width="120" height="220" rx="26" fill="url(#skA)" opacity=".82"/>
<circle cx="118" cy="118" r="48" fill="#C0A070" opacity=".78"/>
<ellipse cx="118" cy="100" rx="48" ry="30" fill="#3A2010" opacity=".8"/>
<!-- arm reaching across table -->
<path d="M168 290 Q280 330 360 328" fill="none" stroke="#B89060" stroke-width="28" stroke-linecap="round" opacity=".78"/>
<!-- hand of A (reaching, palm-up) -->
<ellipse cx="366" cy="328" rx="44" ry="22" fill="#C0A068" opacity=".82"/>
<rect x="334" y="308" width="22" height="46" rx="11" fill="#C4A46C" transform="rotate(-15 345 331)"/>
<rect x="360" y="302" width="20" height="48" rx="10" fill="#C0A068" transform="rotate(-6 370 326)"/>
<rect x="384" y="306" width="18" height="44" rx="9" fill="#BC9C64" transform="rotate(6 393 328)"/>
<!-- PERSON B (right, receiving / comforting) -->
<rect x="620" y="158" width="114" height="210" rx="26" fill="url(#skB)" opacity=".78"/>
<circle cx="678" cy="126" r="46" fill="#B89060" opacity=".74"/>
<ellipse cx="678" cy="108" rx="46" ry="28" fill="#2A1808" opacity=".8"/>
<!-- B hand covering A hand (comfort) -->
<ellipse cx="352" cy="340" rx="46" ry="24" fill="#BC9860" opacity=".8"/>
<path d="M580 290 Q480 330 410 338" fill="none" stroke="#A88860" stroke-width="26" stroke-linecap="round" opacity=".72"/>
<!-- two mugs (near-empty, time has passed) -->
<rect x="108" y="318" width="60" height="72" rx="12" fill="url(#mug)" opacity=".8"/>
<rect x="634" y="312" width="58" height="70" rx="12" fill="url(#mug)" opacity=".75"/>
<!-- vignette -->
<rect width="800" height="500" fill="url(#vig)"/>
<text x="32" y="468" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#D4A870" letter-spacing="4" opacity=".75">STORY 02  ·  I'M SORRY FOR ~ING  ·  COFFEE BROWN</text>
</svg>
