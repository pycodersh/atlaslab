<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C8A870"/><stop offset="100%" stop-color="#A07848"/></linearGradient>
  <linearGradient id="tbl" x1="0" y1="0" x2=".05" y2="1"><stop offset="0%" stop-color="#7A5030"/><stop offset="100%" stop-color="#5A3818"/></linearGradient>
  <linearGradient id="mug" x1="0" y1="0" x2=".2" y2="1"><stop offset="0%" stop-color="#EEE8DC"/><stop offset="100%" stop-color="#D8CCBA"/></linearGradient>
  <radialGradient id="pendant" cx=".5" cy=".08" r=".5"><stop offset="0%" stop-color="#FFE090" stop-opacity=".75"/><stop offset="100%" stop-color="#FFE090" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".72"><stop offset="52%" stop-color="transparent"/><stop offset="100%" stop-color="#2A1408" stop-opacity=".58"/></radialGradient>
  <filter id="b5"><feGaussianBlur stdDeviation="5"/></filter>
  <filter id="b10"><feGaussianBlur stdDeviation="10"/></filter>
</defs>
<!-- CAFÉ WALL warm brown -->
<rect width="800" height="500" fill="url(#wall)"/>
<!-- pendant lamp glow -->
<rect width="800" height="500" fill="url(#pendant)"/>
