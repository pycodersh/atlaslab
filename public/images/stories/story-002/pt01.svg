<ellipse cx="400" cy="32" rx="38" ry="20" fill="#C89040" filter="url(#b5)" opacity=".8"/>
<ellipse cx="400" cy="40" rx="28" ry="14" fill="#FFE080" filter="url(#b5)" opacity=".7"/>
<!-- TABLE SURFACE (espresso dark wood) -->
<rect x="0" y="310" width="800" height="190" fill="url(#tbl)"/>
<rect x="0" y="308" width="800" height="5" fill="#A07840" opacity=".35"/>
