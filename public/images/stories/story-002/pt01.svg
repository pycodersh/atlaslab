<rect width="800" height="500" fill="url(#vig)"/>
<text x="32" y="468" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#D4A870" letter-spacing="4" opacity=".75">STORY 02  ·  I'M PLANNING TO ~  ·  COFFEE BROWN</text>
