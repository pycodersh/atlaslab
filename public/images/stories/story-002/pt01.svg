<rect x="522" y="230" width="100" height="122" rx="20" fill="url(#mug)" opacity=".9"/>
<ellipse cx="572" cy="254" rx="34" ry="12" fill="#FAFAF8" opacity=".28"/>
<rect x="534" y="266" width="76" height="18" rx="9" fill="#C8A060" opacity=".22"/>
<path d="M522 258 Q494 276 522 294" fill="none" stroke="#E0D4C0" stroke-width="18" stroke-linecap="round"/>
<!-- steam R -->
<path d="M548 228 Q542 204 548 180" fill="none" stroke="#C8A870" stroke-width="3" stroke-linecap="round" opacity=".45"/>
<path d="M572 224 Q578 200 572 176" fill="none" stroke="#C8A870" stroke-width="2.5" stroke-linecap="round" opacity=".38"/>
<path d="M594 228 Q600 204 594 182" fill="none" stroke="#C8A870" stroke-width="2.5" stroke-linecap="round" opacity=".33"/>
<!-- MENU CARD between mugs -->
<rect x="360" y="278" width="80" height="110" rx="4" fill="#F0E8D4" opacity=".82"/>
<rect x="368" y="292" width="58" height="5" rx="2.5" fill="#A07828" opacity=".5"/>
<rect x="368" y="308" width="50" height="3" rx="1.5" fill="#C0A050" opacity=".35"/>
<rect x="368" y="318" width="54" height="3" rx="1.5" fill="#C0A050" opacity=".3"/>
<rect x="368" y="328" width="46" height="3" rx="1.5" fill="#C0A050" opacity=".28"/>
<!-- empty chair shadow (anticipation) -->
<ellipse cx="400" cy="488" rx="110" ry="18" fill="#3A2010" opacity=".4"/>
<!-- background bokeh (café details) -->
<rect x="40" y="80" width="100" height="180" fill="#B89060" filter="url(#b10)" opacity=".35"/>
<rect x="660" y="60" width="120" height="200" fill="#C09858" filter="url(#b10)" opacity=".3"/>
