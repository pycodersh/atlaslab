<path d="M278 258 Q306 276 278 294" fill="none" stroke="#E0D4C0" stroke-width="18" stroke-linecap="round"/>
<!-- steam L -->
<path d="M204 230 Q198 206 204 182" fill="none" stroke="#C8A870" stroke-width="3" stroke-linecap="round" opacity=".48"/>
<path d="M228 226 Q234 202 228 178" fill="none" stroke="#C8A870" stroke-width="2.5" stroke-linecap="round" opacity=".4"/>
<path d="M250 230 Q256 206 250 184" fill="none" stroke="#C8A870" stroke-width="2.5" stroke-linecap="round" opacity=".35"/>
