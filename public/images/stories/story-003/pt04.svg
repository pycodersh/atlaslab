<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="tbl" x1="0" y1="0" x2=".05" y2="1"><stop offset="0%" stop-color="#EEF4F8"/><stop offset="100%" stop-color="#D8E8F0"/></linearGradient>
  <linearGradient id="ppr" x1="0" y1="0" x2=".04" y2="1"><stop offset="0%" stop-color="#F2F6FA"/><stop offset="100%" stop-color="#E0EAF2"/></linearGradient>
  <linearGradient id="mug" x1="0" y1="0" x2=".2" y2="1"><stop offset="0%" stop-color="#FAFCFE"/><stop offset="100%" stop-color="#DDE8F2"/></linearGradient>
  <radialGradient id="lgt" cx=".2" cy=".06" r=".72"><stop offset="0%" stop-color="#FFFFFF" stop-opacity=".58"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".72"><stop offset="52%" stop-color="transparent"/><stop offset="100%" stop-color="#3A5468" stop-opacity=".46"/></radialGradient>
  <filter id="b4"><feGaussianBlur stdDeviation="4"/></filter>
  <filter id="b9"><feGaussianBlur stdDeviation="9"/></filter>
</defs>
<!-- TABLE SURFACE close-up, cool morning light -->
<rect width="800" height="500" fill="url(#tbl)"/>
<rect width="800" height="500" fill="url(#lgt)"/>
<!-- window shadow stripes on table -->
<rect x="0" y="0" width="100" height="500" fill="#B8D0E8" opacity=".12" transform="rotate(-3 50 250)"/>
<rect x="60" y="0" width="16" height="500" fill="#A8C4DC" opacity=".1" transform="rotate(-3 68 250)"/>
<!-- NEWSPAPER (Background — takes significant portion) -->
<rect x="80" y="60" width="480" height="296" rx="5" fill="url(#ppr)" opacity=".9"/>
<!-- headline -->
<rect x="100" y="80" width="200" height="12" rx="4" fill="#8AAEC4" opacity=".6"/>
<!-- fold line -->
<rect x="316" y="60" width="4" height="296" fill="#C0D0DC" opacity=".3"/>
<!-- text columns -->
<rect x="100" y="104" width="200" height="4" rx="2" fill="#A8C0D0" opacity=".36"/>
<rect x="100" y="116" width="192" height="4" rx="2" fill="#A8C0D0" opacity=".32"/>
<rect x="100" y="128" width="196" height="4" rx="2" fill="#A8C0D0" opacity=".3"/>
<rect x="100" y="140" width="180" height="4" rx="2" fill="#A8C0D0" opacity=".28"/>
<rect x="100" y="160" width="112" height="68" rx="3" fill="#C0D4E0" opacity=".42"/>
<rect x="220" y="160" width="92" height="68" rx="3" fill="#B8CCDC" opacity=".38"/>
<rect x="336" y="80" width="200" height="4" rx="2" fill="#A8C0D0" opacity=".34"/>
<rect x="336" y="96" width="186" height="4" rx="2" fill="#A8C0D0" opacity=".3"/>
<rect x="336" y="108" width="192" height="4" rx="2" fill="#A8C0D0" opacity=".28"/>
<!-- KEYS on newspaper (Object — FOUND! glinting) -->
<circle cx="268" cy="312" r="26" fill="none" stroke="#6888A8" stroke-width="4.5" opacity=".92"/>
<circle cx="268" cy="312" r="15" fill="#90AAC4" opacity=".52"/>
<rect x="292" y="308" width="68" height="8" rx="4" fill="#7890A8" opacity=".9"/>
<rect x="342" y="296" width="9" height="11" rx="2.5" fill="#6880A0" opacity=".85"/>
<rect x="353" y="296" width="9" height="11" rx="2.5" fill="#6880A0" opacity=".8"/>
<circle cx="264" cy="306" r="6" fill="#FFFFFF" opacity=".55"/>
<!-- second key -->
<circle cx="244" cy="346" r="20" fill="none" stroke="#7888A8" stroke-width="4" opacity=".85"/>
<rect x="262" y="342" width="54" height="7" rx="3.5" fill="#8898B0" opacity=".85"/>
<!-- TEA MUG (Object: bokeh background, right) -->
<rect x="590" y="160" width="128" height="152" rx="24" fill="url(#mug)" filter="url(#b4)" opacity=".82"/>
<!-- coffee ring (Story detail) -->
<circle cx="218" cy="388" rx="44" cy="388" r="44" fill="none" stroke="#8AAABB" stroke-width="2.5" opacity=".28"/>
<!-- HAND: entering frame bottom-left (receiving keys — scene first, hand secondary) -->
<rect x="0" y="400" width="180" height="100" rx="0" fill="#9AB0C4" opacity=".55"/>
<ellipse cx="168" cy="405" rx="72" ry="42" fill="#D0C4B0" opacity=".86"/>
<rect x="108" y="368" width="34" height="72" rx="17" fill="#D4C8B4" transform="rotate(-14 125 404)"/>
<rect x="148" y="360" width="32" height="76" rx="16" fill="#D0C4B0" transform="rotate(-5 164 398)"/>
<rect x="186" y="364" width="30" height="72" rx="15" fill="#CCBFAA" transform="rotate(6 201 400)"/>
<rect x="220" y="370" width="28" height="66" rx="14" fill="#C8BCAA" transform="rotate(14 234 403)"/>
<!-- vignette -->
<rect width="800" height="500" fill="url(#vig)"/>
<text x="32" y="468" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#7AAAC0" letter-spacing="4" opacity=".75">STORY 03  ·  THANK YOU FOR ~ING  ·  SOFT BLUE</text>
</svg>
