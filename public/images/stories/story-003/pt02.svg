<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E4EEF4"/><stop offset="100%" stop-color="#C8D8E4"/></linearGradient>
  <linearGradient id="tbl" x1="0" y1="0" x2=".05" y2="1"><stop offset="0%" stop-color="#EEF4F8"/><stop offset="100%" stop-color="#D8E8F0"/></linearGradient>
  <linearGradient id="mug" x1="0" y1="0" x2=".2" y2="1"><stop offset="0%" stop-color="#FAFCFE"/><stop offset="100%" stop-color="#DDE8F2"/></linearGradient>
  <linearGradient id="win" x1="0" y1="0" x2=".15" y2="1"><stop offset="0%" stop-color="#DAEEFF"/><stop offset="100%" stop-color="#C0DCEE"/></linearGradient>
  <radialGradient id="lgt" cx=".22" cy=".06" r=".72"><stop offset="0%" stop-color="#FFFFFF" stop-opacity=".62"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".72"><stop offset="52%" stop-color="transparent"/><stop offset="100%" stop-color="#3A5468" stop-opacity=".45"/></radialGradient>
  <filter id="b5"><feGaussianBlur stdDeviation="5"/></filter>
  <filter id="b12"><feGaussianBlur stdDeviation="12"/></filter>
</defs>
<!-- WALL -->
<rect width="800" height="500" fill="url(#wall)"/>
<!-- LARGE WINDOW (left) -->
<rect x="-10" y="0" width="320" height="460" fill="url(#win)" filter="url(#b12)" opacity=".7"/>
<!-- rooftops outside (bokeh) -->
<rect x="10" y="60" width="80" height="200" fill="#90A8BC" filter="url(#b12)" opacity=".55"/>
<rect x="100" y="100" width="60" height="160" fill="#88A0B4" filter="url(#b12)" opacity=".5"/>
<rect x="168" y="80" width="48" height="180" fill="#8AAABB" filter="url(#b12)" opacity=".48"/>
<!-- morning light flood -->
<rect width="800" height="500" fill="url(#lgt)"/>
<!-- TABLE -->
<rect x="0" y="318" width="800" height="182" fill="url(#tbl)"/>
<rect x="0" y="316" width="800" height="5" fill="#FFFFFF" opacity=".32"/>
<!-- window shadow bars on table -->
<rect x="40" y="318" width="14" height="182" fill="#B8D0E8" opacity=".14" transform="rotate(-2 47 409)"/>
<!-- teapot (bokeh, far left) -->
<ellipse cx="88" cy="330" rx="64" ry="72" fill="#C8D8E4" filter="url(#b5)" opacity=".55"/>
<ellipse cx="88" cy="282" rx="28" ry="18" fill="#D8E4EE" filter="url(#b5)" opacity=".5"/>
<!-- MAIN TEA MUG (45°, close, centre-left) -->
<rect x="240" y="188" width="200" height="238" rx="36" fill="url(#mug)" opacity=".94"/>
<ellipse cx="340" cy="222" rx="70" ry="22" fill="#FFFFFF" opacity=".28"/>
<!-- tea inside -->
<rect x="258" y="234" width="164" height="34" rx="17" fill="#BCAB72" opacity=".44"/>
<!-- tea bag string -->
<path d="M330" y="188" d="M330 188 Q322 148 330 116" fill="none" stroke="#A89870" stroke-width="2.5" stroke-linecap="round" opacity=".6"/>
<rect x="314" y="100" width="36" height="22" rx="5" fill="#E8D8B0" opacity=".75"/>
<!-- steam -->
<path d="M280 188 Q274 158 280 128" fill="none" stroke="#A8C4D8" stroke-width="3" stroke-linecap="round" opacity=".52"/>
<path d="M340 182 Q346 152 340 122" fill="none" stroke="#A8C4D8" stroke-width="2.8" stroke-linecap="round" opacity=".44"/>
<path d="M396 188 Q402 158 396 128" fill="none" stroke="#A8C4D8" stroke-width="2.5" stroke-linecap="round" opacity=".38"/>
<!-- handle -->
<path d="M440 234 Q488 268 440 304" fill="none" stroke="#E0EEF8" stroke-width="30" stroke-linecap="round"/>
<path d="M440 234 Q488 268 440 304" fill="none" stroke="#D0E8F4" stroke-width="18" stroke-linecap="round"/>
<!-- HAND wrapping mug (sleeve visible, action: warming cold hands) -->
<rect x="468" y="216" width="82" height="154" rx="36" fill="#98B0C4" opacity=".62"/>
<ellipse cx="445" cy="295" rx="56" ry="44" fill="#D0C4B0" opacity=".84"/>
<rect x="394" y="256" width="52" height="26" rx="13" fill="#D4C8B4" opacity=".76"/>
<rect x="388" y="288" width="54" height="24" rx="12" fill="#D0C4B0" opacity=".8"/>
<rect x="394" y="318" width="50" height="22" rx="11" fill="#CCBFAA" opacity=".74"/>
<!-- saucer -->
<ellipse cx="340" cy="430" rx="148" ry="22" fill="#E0EEF8" opacity=".55"/>
<!-- vignette -->
<rect width="800" height="500" fill="url(#vig)"/>
<text x="32" y="468" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#7AAAC0" letter-spacing="4" opacity=".75">STORY 03  ·  I DON'T ~  ·  SOFT BLUE</text>
</svg>
