<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#B0C8E2"/><stop offset="100%" stop-color="#C8DCF0"/></linearGradient>
  <linearGradient id="room" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D8EAF4"/><stop offset="100%" stop-color="#C0D8EC"/></linearGradient>
  <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D0DCE8"/><stop offset="100%" stop-color="#B8CADA"/></linearGradient>
  <linearGradient id="mug" x1="0" y1="0" x2=".2" y2="1"><stop offset="0%" stop-color="#FAFCFE"/><stop offset="100%" stop-color="#DDE8F2"/></linearGradient>
  <radialGradient id="lgt" cx=".5" cy=".08" r=".72"><stop offset="0%" stop-color="#FFFFFF" stop-opacity=".62"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".72"><stop offset="50%" stop-color="transparent"/><stop offset="100%" stop-color="#2A4054" stop-opacity=".5"/></radialGradient>
  <filter id="b4"><feGaussianBlur stdDeviation="4"/></filter>
  <filter id="b9"><feGaussianBlur stdDeviation="9"/></filter>
  <filter id="b14"><feGaussianBlur stdDeviation="14"/></filter>
</defs>
<!-- OUTSIDE: cool blue dawn sky -->
<rect width="800" height="500" fill="url(#sky)"/>
<!-- LARGE WINDOW fills upper 70% -->
<rect x="40" y="20" width="720" height="340" rx="6" fill="url(#room)" opacity=".88"/>
<!-- city rooftops outside (bokeh) -->
<rect x="60" y="50" width="80" height="200" fill="#80A0B8" filter="url(#b14)" opacity=".52"/>
<rect x="150" y="70" width="60" height="180" fill="#78A0B4" filter="url(#b14)" opacity=".48"/>
<rect x="220" y="44" width="100" height="206" fill="#80A8BC" filter="url(#b14)" opacity=".5"/>
<rect x="490" y="60" width="90" height="190" fill="#80A0B8" filter="url(#b14)" opacity=".5"/>
<rect x="590" y="40" width="120" height="210" fill="#78A0B8" filter="url(#b14)" opacity=".52"/>
<rect x="706" y="70" width="60" height="180" fill="#80A8BC" filter="url(#b14)" opacity=".46"/>
<!-- window frame -->
<rect x="40" y="20" width="720" height="340" rx="6" fill="none" stroke="#B0C8DC" stroke-width="8" opacity=".4"/>
<rect x="396" y="20" width="8" height="340" fill="#B0C8DC" opacity=".35"/>
<rect x="40" y="188" width="720" height="6" fill="#B0C8DC" opacity=".3"/>
<!-- morning light -->
<rect width="800" height="500" fill="url(#lgt)"/>
<!-- ROOM: wall sides + floor -->
<rect x="0" y="0" width="44" height="500" fill="url(#room)" opacity=".7"/>
<rect x="756" y="0" width="44" height="500" fill="url(#room)" opacity=".7"/>
<rect x="0" y="360" width="800" height="140" fill="url(#floor)"/>
<rect x="0" y="358" width="800" height="5" fill="#B8CCD8" opacity=".3"/>
<!-- window sill -->
<rect x="0" y="356" width="800" height="18" rx="3" fill="#E4F0F8" opacity=".65"/>
<!-- CHAIR (person was sitting here) -->
<ellipse cx="298" cy="390" rx="108" ry="28" fill="#C0D0DC" opacity=".68"/>
<rect x="204" y="388" width="12" height="84" rx="6" fill="#A8B8C4" opacity=".62" transform="rotate(-5 210 430)"/>
<rect x="380" y="388" width="12" height="84" rx="6" fill="#A8B8C4" opacity=".62" transform="rotate(5 386 430)"/>
<!-- SILHOUETTE: person sitting, back to viewer, looking at window -->
<rect x="228" y="298" width="108" height="120" rx="22" fill="#4A6478" opacity=".72"/>
<circle cx="280" cy="272" r="46" fill="#3A5468" opacity=".75"/>
<ellipse cx="280" cy="254" rx="46" ry="28" fill="#243040" opacity=".82"/>
<!-- arm resting on sill -->
<path d="M232" cy="338" d="M232 338 Q184 348 40 356" fill="none" stroke="#4A6478" stroke-width="22" stroke-linecap="round" opacity=".6"/>
<!-- MUG on window sill (hero: steam against dawn light) -->
<rect x="586" y="292" width="106" height="120" rx="22" fill="url(#mug)" opacity=".94"/>
<ellipse cx="639" cy="314" rx="36" ry="12" fill="#FFFFFF" opacity=".28"/>
<rect x="598" y="322" width="82" height="20" rx="10" fill="#B8A870" opacity=".4"/>
<path d="M610" y="292" d="M610 292 Q602 256 610 222" fill="none" stroke="#A8C4D8" stroke-width="3" stroke-linecap="round" opacity=".62"/>
<path d="M640 286 Q648 250 640 216" fill="none" stroke="#A8C4D8" stroke-width="2.8" stroke-linecap="round" opacity=".54"/>
<path d="M668 290 Q676 254 668 222" fill="none" stroke="#A8C4D8" stroke-width="2.5" stroke-linecap="round" opacity=".45"/>
<path d="M692 316 Q716 334 692 354" fill="none" stroke="#E0F0F8" stroke-width="20" stroke-linecap="round"/>
<path d="M692 316 Q716 334 692 354" fill="none" stroke="#D0E8F6" stroke-width="12" stroke-linecap="round"/>
<!-- light pool on floor from window -->
<rect x="50" y="365" width="700" height="55" fill="#C8E0F4" opacity=".12" filter="url(#b4)"/>
<!-- vignette -->
<rect width="800" height="500" fill="url(#vig)"/>
<text x="32" y="468" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#7AAAC0" letter-spacing="4" opacity=".75">STORY 03  ·  I JUST WANTED TO ~  ·  SOFT BLUE</text>
</svg>
