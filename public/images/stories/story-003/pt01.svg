<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D8E8F2"/><stop offset="100%" stop-color="#C0D4E4"/></linearGradient>
  <linearGradient id="tbl" x1="0" y1="0" x2=".06" y2="1"><stop offset="0%" stop-color="#EAF2F8"/><stop offset="100%" stop-color="#D4E4F0"/></linearGradient>
  <linearGradient id="mug" x1="0" y1="0" x2=".2" y2="1"><stop offset="0%" stop-color="#FAFCFE"/><stop offset="100%" stop-color="#E0EEF8"/></linearGradient>
  <radialGradient id="win" cx=".22" cy=".08" r=".68"><stop offset="0%" stop-color="#FFFFFF" stop-opacity=".6"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
  <radialGradient id="vig" cx=".5" cy=".5" r=".72"><stop offset="52%" stop-color="transparent"/><stop offset="100%" stop-color="#3A5468" stop-opacity=".45"/></radialGradient>
  <filter id="b4"><feGaussianBlur stdDeviation="4"/></filter>
  <filter id="b9"><feGaussianBlur stdDeviation="9"/></filter>
</defs>
<!-- KITCHEN TOP VIEW — cool morning -->
<rect width="800" height="500" fill="url(#bg)"/>
<ellipse cx="400" cy="300" rx="390" ry="240" fill="url(#tbl)"/>
<rect width="800" height="500" fill="url(#win)"/>
