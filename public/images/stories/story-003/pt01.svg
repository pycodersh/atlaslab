<path d="M610 146 Q616 126 610 108" fill="none" stroke="#A8C4D8" stroke-width="2.5" stroke-linecap="round" opacity=".38"/>
<!-- KEYS on newspaper -->
<circle cx="248" cy="316" r="22" fill="none" stroke="#7A90A8" stroke-width="4" opacity=".88"/>
<circle cx="248" cy="316" r="13" fill="#98B0C4" opacity=".48"/>
<rect x="268" y="313" width="56" height="7" rx="3.5" fill="#8898B0" opacity=".88"/>
