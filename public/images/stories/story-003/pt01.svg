<text x="32" y="468" font-family="Helvetica Neue,Helvetica,sans-serif" font-size="11" fill="#7AAAC0" letter-spacing="4" opacity=".75">STORY 03  ·  I HAVE TO ~  ·  SOFT BLUE</text>
