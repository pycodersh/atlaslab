<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>K-PATTO Webtoon Base Layout</title>
<style>
:root {
  --page-width: 430px;
  --paper: #ffffff;
  --outer: #ece9e4;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  min-height: 100%;
  background: var(--outer);
}
body {
  display: flex;
  justify-content: center;
}
.webtoon {
  width: min(100%, var(--page-width));
  background: var(--paper);
  overflow: hidden;
  box-shadow: 0 0 32px rgba(0,0,0,.08);
}
.panel { margin: 0; }
.panel img {
  display: block;
  width: 100%;
  height: auto;
}
.panel.wide { width: 100%; }
.panel.medium-left {
  width: 78%;
  margin-right: auto;
}
.panel.medium-right {
  width: 78%;
  margin-left: auto;
}
.gap {
  width: 100%;
  position: relative;
}
.gap-top { height: 260px; }
.gap-1 { height: 320px; }
.gap-2 { height: 380px; }
.gap-3 { height: 300px; }
.gap-4 { height: 360px; }
.gap-bottom { height: 420px; }

@media (max-width: 360px) {
  .gap-top { height: 220px; }
  .gap-1 { height: 280px; }
  .gap-2 { height: 330px; }
  .gap-3 { height: 260px; }
  .gap-4 { height: 320px; }
  .gap-bottom { height: 360px; }
}
</style>
