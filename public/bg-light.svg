<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <!-- Base linear: top-left → bottom-right -->
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#D8E4F4"/>
      <stop offset="50%"  stop-color="#C8D8F0"/>
      <stop offset="100%" stop-color="#BED0EE"/>
    </linearGradient>
    <!-- Glow 1: top-right white -->
    <radialGradient id="g1" cx="60%" cy="20%" r="55%">
      <stop offset="0%"   stop-color="#FFFFFF"  stop-opacity="0.9"/>
      <stop offset="40%"  stop-color="#E4EEF8"  stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E4EEF8"  stop-opacity="0"/>
    </radialGradient>
    <!-- Glow 2: bottom-left ice blue -->
    <radialGradient id="g2" cx="30%" cy="75%" r="50%">
      <stop offset="0%"   stop-color="#D0E4F8"  stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#C0D4F0"  stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C0D4F0"  stop-opacity="0"/>
    </radialGradient>
    <!-- Glow 3: center-right -->
    <radialGradient id="g3" cx="80%" cy="60%" r="40%">
      <stop offset="0%"   stop-color="#E8F0FA"  stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E8F0FA"  stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="390" height="844" fill="url(#base)"/>
  <rect width="390" height="844" fill="url(#g1)"/>
  <rect width="390" height="844" fill="url(#g2)"/>
  <rect width="390" height="844" fill="url(#g3)"/>
</svg>
